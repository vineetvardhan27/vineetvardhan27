<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="100%" height="220">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14"/>
      <stop offset="50%" stop-color="#0D1322"/>
      <stop offset="100%" stop-color="#060910"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B84F7"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#FFB454"/>
    </linearGradient>
    
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B84F7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFB454" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5B84F7" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B84F7" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFB454" stop-opacity="0.6"/>
    </linearGradient>

    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB454" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5B84F7" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style><![CDATA[
    .bg { fill: url(#bgGrad); rx: 16px; }
    
    .grid-line {
      stroke: #1E293B;
      stroke-width: 1;
      stroke-opacity: 0.4;
    }

    /* Wave animations */
    .wave1 {
      animation: moveWave1 8s ease-in-out infinite alternate;
    }
    .wave2 {
      animation: moveWave2 12s ease-in-out infinite alternate;
    }
    
    @keyframes moveWave1 {
      0% { transform: translateY(0px) scaleY(1); }
      50% { transform: translateY(-10px) scaleY(1.1); }
      100% { transform: translateY(5px) scaleY(0.95); }
    }
    
    @keyframes moveWave2 {
      0% { transform: translateY(0px) scaleY(1); }
      50% { transform: translateY(8px) scaleY(0.9); }
      100% { transform: translateY(-8px) scaleY(1.05); }
    }

    /* Floating particle animations */
    .particle {
      animation: float 6s ease-in-out infinite;
    }
    .p1 { animation-delay: 0s; }
    .p2 { animation-delay: 1.5s; }
    .p3 { animation-delay: 3s; }
    .p4 { animation-delay: 4.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
      50% { transform: translateY(-12px) translateX(6px); opacity: 0.9; }
    }

    /* Text Glow & Shimmer */
    .title-text {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      font-weight: 800;
      font-size: 46px;
      letter-spacing: 4px;
      fill: url(#textGrad);
      filter: drop-shadow(0px 0px 12px rgba(91, 132, 247, 0.4));
      animation: pulseGlow 4s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      0% { filter: drop-shadow(0px 0px 8px rgba(91, 132, 247, 0.3)); }
      100% { filter: drop-shadow(0px 0px 22px rgba(255, 180, 84, 0.6)); }
    }

    /* Subtitle & Badge styling */
    .sub-text {
      font-family: 'Consolas', 'Fira Code', 'Courier New', monospace;
      font-size: 15px;
      fill: #94A3B8;
      letter-spacing: 1.5px;
    }
    
    .accent-text {
      fill: #FFB454;
      font-weight: 600;
    }
    
    .blue-text {
      fill: #5B84F7;
      font-weight: 600;
    }

    /* Scanning beam */
    .scan-line {
      animation: scan 4s linear infinite;
    }

    @keyframes scan {
      0% { transform: translateX(-900px); }
      100% { transform: translateX(900px); }
    }

    /* Cursor blinking */
    .cursor {
      animation: blink 1s step-start infinite;
      fill: #FFB454;
    }
    
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Border pulse */
    .border-line {
      stroke: url(#lineGrad);
      stroke-width: 1.5;
      animation: borderPulse 3s ease-in-out infinite alternate;
    }
    
    @keyframes borderPulse {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }
  ]]></style>

  <!-- Background Card -->
  <rect width="900" height="220" class="bg" stroke="#1E293B" stroke-width="1" />

  <!-- Animated Background Waves / Cyber Mesh -->
  <g opacity="0.6">
    <path class="wave1" fill="none" stroke="url(#waveGrad1)" stroke-width="2" 
          d="M -50 160 Q 150 100 350 150 T 750 130 T 950 170" />
    <path class="wave2" fill="none" stroke="url(#waveGrad2)" stroke-width="1.5" 
          d="M -50 180 Q 200 130 450 170 T 800 120 T 950 150" />
  </g>

  <!-- Grid Accents -->
  <g opacity="0.15">
    <line x1="150" y1="0" x2="150" y2="220" class="grid-line" />
    <line x1="350" y1="0" x2="350" y2="220" class="grid-line" />
    <line x1="550" y1="0" x2="550" y2="220" class="grid-line" />
    <line x1="750" y1="0" x2="750" y2="220" class="grid-line" />
    <line x1="0" y1="60" x2="900" y2="60" class="grid-line" />
    <line x1="0" y1="160" x2="900" y2="160" class="grid-line" />
  </g>

  <!-- Floating Tech Particles -->
  <circle cx="120" cy="70" r="3" fill="#5B84F7" class="particle p1" filter="url(#glow)"/>
  <circle cx="780" cy="65" r="2.5" fill="#FFB454" class="particle p2" filter="url(#glow)"/>
  <circle cx="220" cy="170" r="2" fill="#60A5FA" class="particle p3" filter="url(#glow)"/>
  <circle cx="680" cy="175" r="3.5" fill="#5B84F7" class="particle p4" filter="url(#glow)"/>
  
  <!-- Constellation Nodes & Connecting Lines -->
  <g opacity="0.3">
    <line x1="120" y1="70" x2="180" y2="40" stroke="#5B84F7" stroke-width="0.8" stroke-dasharray="2 2" />
    <circle cx="180" cy="40" r="2" fill="#5B84F7" />
    <line x1="780" y1="65" x2="730" y2="100" stroke="#FFB454" stroke-width="0.8" stroke-dasharray="2 2" />
    <circle cx="730" cy="100" r="2" fill="#FFB454" />
  </g>

  <!-- Center Content -->
  <!-- Top Decorative Tech Tag -->
  <g transform="translate(450, 45)">
    <rect x="-90" y="-14" width="180" height="22" rx="11" fill="#0F172A" stroke="#334155" stroke-width="1"/>
    <text x="0" y="2" class="sub-text" font-size="11" text-anchor="middle">
      <tspan class="blue-text">&lt;</tspan> PORTFOLIO <tspan class="accent-text">/&gt;</tspan>
    </text>
  </g>

  <!-- Main Name Header -->
  <text x="450" y="115" text-anchor="middle" class="title-text">VINEET VARDHAN</text>

  <!-- Bottom Subtitle / Terminal Bar -->
  <g transform="translate(450, 158)">
    <text class="sub-text" text-anchor="middle">
      <tspan fill="#64748B">sys.init(</tspan><tspan class="blue-text">&quot;Full-Stack&quot;</tspan><tspan fill="#64748B">, </tspan><tspan class="accent-text">&quot;AI/ML&quot;</tspan><tspan fill="#64748B">)</tspan>
    </text>
    <rect x="150" y="-12" width="8" height="15" class="cursor" />
  </g>

  <!-- Scanning Light Beam Accent -->
  <g opacity="0.7">
    <line x1="0" y1="219" x2="900" y2="219" class="border-line" />
    <rect class="scan-line" x="0" y="218" width="180" height="2" fill="url(#lineGrad)" />
  </g>
</svg>
