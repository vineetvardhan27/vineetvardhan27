<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="100%" height="240">
  <defs>
    <!-- Background Base -->
    <linearGradient id="appleBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080A0F"/>
      <stop offset="50%" stop-color="#0C0E17"/>
      <stop offset="100%" stop-color="#05060A"/>
    </linearGradient>

    <!-- Apple Intelligence / Aurora Light Orbs -->
    <radialGradient id="auroraIndigo" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#312E81" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#080A0F" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="auroraCyan" cx="70%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#0284C7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#080A0F" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="auroraAmber" cx="50%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#D97706" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#080A0F" stop-opacity="0"/>
    </radialGradient>

    <!-- Typography Metallic/Aurora Gradient -->
    <linearGradient id="appleTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#E0E7FF"/>
      <stop offset="70%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>

    <!-- Subtle Hairline Glass Border -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style><![CDATA[
    .card-bg {
      fill: url(#appleBg);
      rx: 20px;
    }

    /* Apple Aurora Ambient Animations */
    .aurora-orb-1 {
      animation: floatOrb1 12s ease-in-out infinite alternate;
    }
    .aurora-orb-2 {
      animation: floatOrb2 10s ease-in-out infinite alternate;
    }
    .aurora-orb-3 {
      animation: floatOrb3 14s ease-in-out infinite alternate;
    }

    @keyframes floatOrb1 {
      0% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(40px, -20px) scale(1.15); }
      100% { transform: translate(-20px, 15px) scale(0.95); }
    }

    @keyframes floatOrb2 {
      0% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(-35px, 25px) scale(1.1); }
      100% { transform: translate(25px, -15px) scale(0.9); }
    }

    @keyframes floatOrb3 {
      0% { transform: translate(0px, 0px) opacity(0.2); }
      50% { transform: translate(20px, -15px) opacity(0.35); }
      100% { transform: translate(-30px, 10px) opacity(0.15); }
    }

    /* Main Name Typography - Apple SF Pro feel */
    .name-title {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'Segoe UI', sans-serif;
      font-weight: 700;
      font-size: 42px;
      letter-spacing: 7px;
      fill: url(#appleTextGrad);
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
    }

    /* Airbnb Style Capsule Badge */
    .badge-rect {
      fill: rgba(255, 255, 255, 0.05);
      stroke: rgba(255, 255, 255, 0.12);
      stroke-width: 1;
      rx: 100px;
    }

    .badge-text {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      fill: #94A3B8;
    }

    .status-dot {
      fill: #10B981;
      animation: pulseDot 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    /* Subtitle Line */
    .sub-title {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 3px;
      fill: #94A3B8;
    }

    .divider-line {
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 1;
    }
  ]]></style>

  <!-- Background Base Container -->
  <rect width="900" height="240" class="card-bg" stroke="url(#glassBorder)" stroke-width="1.5" />

  <!-- Apple Aurora Ambient Light Orbs (Background Glow Layer) -->
  <g opacity="0.95">
    <circle cx="280" cy="90" r="220" fill="url(#auroraIndigo)" class="aurora-orb-1" />
    <circle cx="620" cy="80" r="200" fill="url(#auroraCyan)" class="aurora-orb-2" />
    <circle cx="450" cy="180" r="170" fill="url(#auroraAmber)" class="aurora-orb-3" />
  </g>

  <!-- Fine Geometry Grid Overlay (Minimalist Classic Touch) -->
  <g opacity="0.04">
    <line x1="0" y1="120" x2="900" y2="120" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="240" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Center Content Layout -->
  
  <!-- 1. Airbnb-Style Capsule Chip -->
  <g transform="translate(450, 48)">
    <rect x="-135" y="-14" width="270" height="28" class="badge-rect" />
    <circle cx="-110" cy="0" r="3.5" class="status-dot" />
    <text x="-95" y="4" class="badge-text">FULL-STACK &amp; AI/ML ENGINEER</text>
  </g>

  <!-- 2. Hero Name Title (Apple-style Typography) -->
  <g transform="translate(450, 122)">
    <text text-anchor="middle" class="name-title">VINEET VARDHAN</text>
  </g>

  <!-- 3. Minimalist Classic Divider & Tagline -->
  <g transform="translate(450, 178)">
    <!-- Left Hairline Divider -->
    <line x1="-310" y1="0" x2="-195" y2="0" class="divider-line" />
    
    <!-- Subtitle Bullet Points -->
    <text text-anchor="middle" y="4" class="sub-title">
      DISTRIBUTED SYSTEMS <tspan fill="#38BDF8">·</tspan> COLLABORATIVE PLATFORMS <tspan fill="#F59E0B">·</tspan> AI RESEARCH
    </text>
    
    <!-- Right Hairline Divider -->
    <line x1="195" y1="0" x2="310" y2="0" class="divider-line" />
  </g>

  <!-- Top Ambient Glass Highlight Edge -->
  <path d="M 20 1 Q 450 1 880 1" stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none" />
</svg>
